[server]
host = "127.0.0.1"
port = 8000

[shell]
# On Windows the app prefers Git Bash automatically when this is empty.
path = ""

[providers.gemini]
enabled = true
executable = ""
models = ["gemini-3-flash-preview"]
default_options = { extra_args = [] }
# Desktop app manages timeouts via agent_timeout_ms; 0 = no sidecar timeout.
cli_timeout = 0

[providers.codex]
enabled = true
executable = ""
models = ["codex-5.3", "gpt-5.4", "gpt-5.4-mini"]
default_options = { extra_args = [] }
cli_timeout = 0

[providers.claude]
enabled = true
executable = ""
models = ["opus", "sonnet", "haiku"]
default_options = { extra_args = [] }
cli_timeout = 0

[providers.kimi]
enabled = true
executable = ""
models = ["kimi-code/kimi-for-coding"]
default_options = { extra_args = [] }
cli_timeout = 0

[providers.copilot]
enabled = true
executable = ""
models = [
  "claude-sonnet-4.6",
  "claude-haiku-4.5",
  "claude-opus-4.6",
  "gpt-5.4",
  "gpt-5.3-codex",
  "gpt-5.4-mini",
]
default_options = { extra_args = [] }
cli_timeout = 0

[providers.opencode]
enabled = true
executable = ""
models = ["glm-5", "glm-5.1", "glm-5-turbo", "glm-4.7"]
default_options = { extra_args = [] }
cli_timeout = 0

[updater]
enabled = true
interval_hours = 4
auto_update = true
